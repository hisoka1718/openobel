<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Openobel - Unlocking Genius & Innovation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }
        /* خلفية ضوئية خفيفة */
        body::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(0, 115, 255, 0.1) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }
        .container { max-width: 700px; padding: 40px 20px; z-index: 1; }
        .logo {
            max-width: 300px;
            width: 100%;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
            animation: fadeIn 2s ease-in;
        }
        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 40px;
            font-weight: 300;
            line-height: 1.6;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-group { display: flex; gap: 10px; flex-wrap: wrap; }
        input[type="email"] {
            flex: 2;
            min-width: 200px;
            padding: 18px;
            font-size: 1rem;
            border: 1px solid #444;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        input[type="email"]:focus { border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        button {
            flex: 1;
            padding: 18px 30px;
            font-size: 0.9rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #d4af37, #b8860b);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); }
        .message { display: none; color: #d4af37; font-size: 1.2rem; margin-top: 10px; }
        footer { position: absolute; bottom: 30px; font-size: 0.8rem; color: #555; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .form-group { flex-direction: column; } button { width: 100%; } }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Openobel Logo" class="logo">
        <h1>Coming Soon</h1>
        <p class="tagline">The nexus of genius and innovation is almost here. Join the exclusive waitlist for early access.</p>
        
        <div class="form-container">
            <form id="waitlist-form" action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                <div class="form-group">
                    <input type="email" name="email" id="email" placeholder="Enter your professional email" required>
                    <button type="submit" id="submit-btn">Join Waitlist</button>
                </div>
            </form>
            <div class="message" id="success-message">
                ✨ Excellence awaits. You're on the list!
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Openobel. Built for Innovation.</footer>

    <script>
        const form = document.getElementById('waitlist-form');
        const message = document.getElementById('success-message');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            btn.innerText = "Sending...";
            btn.disabled = true;

            const data = new FormData(form);
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    form.style.display = 'none';
                    message.style.display = 'block';
                } else {
                    throw new Error();
                }
            } catch (error) {
                alert('Connection error. Please try again.');
                btn.innerText = "Join Waitlist";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
